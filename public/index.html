<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Magma Links</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-main animate__animated animate__fadeInDown">

    <img src="images/logo-magma-3.png"
         class="logo"
         alt="Magma">

    <input
        id="url"
        class="campo"
        placeholder="Cole sua URL">

    <input
        id="alias"
        class="campo"
        placeholder="Alias opcional">

    <button onclick="enviar()" class="botao">
        Gerar Link
    </button>

    <div class="resultado-box">

        <p id="resultado"></p>

        <button
            id="copiarBtn"
            onclick="copiarLink()"
            style="display:none;">
            Copiar Link
        </button>

    </div>

    <img id="qrcode" width="180">

</div>

<script>

    document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("url")
        .addEventListener("keydown", function(event) {

            if (event.key === "Enter") {
                event.preventDefault();
                enviar();
            }

        });

    document.getElementById("alias")
        .addEventListener("keydown", function(event) {

            if (event.key === "Enter") {
                event.preventDefault();
                enviar();
            }

        });

});

let linkGerado = "";

async function enviar() {

    const url = document.getElementById("url").value;
    const alias = document.getElementById("alias").value;

    const resposta = await fetch("/encurtar", {
        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            url,
            alias
        })
    });

    const dados = await resposta.json();

    linkGerado = dados.link;

    document.getElementById("resultado").innerText =
        dados.link;

    document.getElementById("qrcode").src =
        dados.qr;

    document.getElementById("copiarBtn").style.display =
        "inline-block";

        document.getElementById("url").value = "";
document.getElementById("alias").value = "";
document.getElementById("url").focus();
}

function copiarLink() {

    navigator.clipboard.writeText(linkGerado);

    alert("Link copiado.");
}

</script>

</body>
</html>
