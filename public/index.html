<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Magma Links</title>

<style>

body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.container{
  width:100%;
  max-width:600px;
  text-align:center;
  padding:20px;
}

h1{
  color:#ff9700;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  box-sizing:border-box;
  border:none;
  border-radius:4px;
}

button{
  background:#ff9700;
  color:#000;
  border:none;
  padding:12px 20px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

#resultado{
  margin-top:20px;
}

#resultado a{
  color:#ff9700;
  text-decoration:none;
  font-weight:bold;
}

#qrcode{
  margin-top:20px;
  max-width:250px;
}

</style>

</head>
<body>

<div class="container">

  <h1>Magma Links</h1>

  <form onsubmit="enviar(event)">

    <input
      id="url"
      placeholder="Cole sua URL aqui"
      required
      autofocus
    >

    <input
      id="alias"
      placeholder="Alias opcional"
    >

    <button type="submit">
      Gerar
    </button>

  </form>

  <div id="resultado"></div>

  <img
    id="qrcode"
    src=""
    alt=""
  >

</div>

<script>

async function enviar(event){

  event.preventDefault();

  const url =
    document.getElementById("url").value;

  const alias =
    document.getElementById("alias").value;

  try{

    const resposta =
      await fetch("/encurtar", {

        method:"POST",

        headers:{
          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
          url,
          alias
        })

      });

    const dados =
      await resposta.json();

    if(dados.erro){

      alert(dados.erro);
      return;

    }

    document.getElementById(
      "resultado"
    ).innerHTML = `
      <a
        href="${dados.link}"
        target="_blank"
      >
        ${dados.link}
      </a>
    `;

    document.getElementById(
      "qrcode"
    ).src = dados.qr;

    document.getElementById(
      "url"
    ).value = "";

    document.getElementById(
      "alias"
    ).value = "";

    document.getElementById(
      "url"
    ).focus();

  }catch(error){

    alert(
      "Erro ao gerar link."
    );

    console.error(error);

  }

}

</script>

</body>
</html>
