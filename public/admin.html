<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Magma Links Admin</title>

<style>

body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  max-width:900px;
  margin:auto;
  padding:30px;
}

h1{
  color:#ff9700;
  margin-bottom:30px;
}

.item{
  border:1px solid #333;
  padding:20px;
  margin-bottom:15px;
}

.alias{
  color:#ff9700;
  font-weight:bold;
  text-decoration:none;
  font-size:22px;
}

.url{
  color:#fff;
  word-break:break-all;
}

.botoes{
  margin-top:15px;
  display:flex;
  gap:10px;
}

button{
  background:#ff9700;
  color:#000;
  border:none;
  padding:10px 15px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

</style>

</head>
<body>

<h1>Magma Links Admin</h1>

<div id="lista"></div>

<script>

async function carregarLinks(){

  const resposta =
    await fetch("/api/links");

  const links =
    await resposta.json();

  const lista =
    document.getElementById("lista");

  lista.innerHTML = "";

  for(const codigo in links){

    lista.innerHTML += `
      <div class="item">

        <a
          class="alias"
          href="https://links.magmafilms.com.br/${codigo}"
          target="_blank"
        >
          ${codigo}
        </a>

        <br><br>

        <a
          class="url"
          href="${links[codigo]}"
          target="_blank"
        >
          ${links[codigo]}
        </a>

        <div class="botoes">

          <button
            onclick="copiarLink('${codigo}')">
            Copiar
          </button>

          <button
            onclick="excluirLink('${codigo}')">
            Excluir
          </button>

        </div>

      </div>
    `;
  }

}

async function copiarLink(codigo){

  await navigator.clipboard.writeText(
    "https://links.magmafilms.com.br/" + codigo
  );

  alert("Link copiado!");

}

async function excluirLink(codigo){

  const confirmar = confirm(
    "Deseja excluir este link?"
  );

  if(!confirmar){
    return;
  }

  await fetch(
    "/api/links/" + codigo,
    {
      method:"DELETE"
    }
  );

  carregarLinks();

}

carregarLinks();

</script>

</body>
</html>
